# Railway deployment configuration.
# In the Railway dashboard: connect this GitHub repo, then set
# "Root Directory" to /backend so Railway uses backend/ as the build context.
# The settings below are picked up automatically.

[build]
dockerfilePath = "Dockerfile"

[deploy]
# The /health endpoint lets Railway verify the container is up before routing traffic.
healthcheckPath = "/health"
healthcheckTimeout = 30
